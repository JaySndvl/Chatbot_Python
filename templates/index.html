<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-panel">
        <div>
          <p class="eyebrow">Focused chat</p>
          <h1>{{ app_name }}</h1>
          <p class="lede">A clean, topic-focused assistant built for quick back-and-forth conversations.</p>
        </div>
      </section>

      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <h2>Macro chatbot</h2>
            <p>Ask a question and keep the conversation moving.</p>
          </div>
        </header>

        <div class="chat-body">
          <div id="chat-log" class="chat-log" aria-live="polite"></div>

          <form id="chat-form" class="composer">
            <label class="sr-only" for="message">Message</label>
            <textarea id="message" rows="3" placeholder="Ask a focused question about the topic..." required></textarea>
            <p class="composer-note">Press Enter to send instantly. Shift+Enter adds a new line.</p>
            <div class="composer-actions">
              <button type="submit">Send</button>
              <button type="button" id="clear-chat" class="secondary">Clear</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script>
      window.appConfig = {
        topicName: "{{ topic_name }}",
        topicDescription: "{{ topic_description }}",
      };
    </script>
    <script src="/static/app.js"></script>
  </body>
</html>
